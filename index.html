<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leonardo Mazzeu | Automação de Processos e Inteligência Artificial para PMEs</title>
  <meta name="description" content="Especialista em automação de processos e IA para pequenas e médias empresas. Mergulho no seu negócio, identifico o que trava o crescimento e automatizo — e fico até o resultado aparecer." />

  <!-- Open Graph -->
  <meta property="og:title" content="Leonardo Mazzeu | Automação de Processos e IA para PMEs" />
  <meta property="og:description" content="Especialista em automação de processos e IA para pequenas e médias empresas. Mergulho no seu negócio, identifico o que trava o crescimento e automatizo." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://leonardomazzeu.com.br" />
  <meta property="og:image" content="https://leonardomazzeu.com.br/og-image.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230F1B2D'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-weight='700' font-size='14' fill='%232563EB'%3ELM%3C/text%3E%3C/svg%3E" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── VARIABLES ── */
    :root {
      --navy:       #0F1B2D;
      --navy-card:  #162236;
      --blue:       #2563EB;
      --blue-dim:   rgba(37, 99, 235, 0.15);
      --slate:      #64748B;
      --border:     #E2E8F0;
      --off-white:  #F8FAFC;
      --white:      #FFFFFF;

      --font-display: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-body:    'Inter', system-ui, sans-serif;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --section-pad: 96px 0;
      --container-max: 1100px;
      --container-pad: 0 24px;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--white);
      color: var(--navy);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── UTILITIES ── */
    .container {
      max-width: var(--container-max);
      margin: 0 auto;
      padding: var(--container-pad);
    }

    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s var(--ease-out), transform 0.6s var(--ease-out);
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .fade-in {
        opacity: 1;
        transform: none;
        transition: none;
      }
    }

    /* ── TYPOGRAPHY SCALE ── */
    .text-display {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }
    .text-heading {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }
    .text-subheading {
      font-family: var(--font-display);
      font-size: 1.125rem;
      font-weight: 700;
      line-height: 1.4;
    }
    .text-body {
      font-size: 1rem;
      line-height: 1.7;
    }
    .text-small {
      font-size: 0.875rem;
      line-height: 1.6;
    }

    /* ── BUTTON ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s var(--ease-out), box-shadow 0.15s var(--ease-out);
      border: none;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .btn:active { transform: translateY(0); }
    .btn-whatsapp {
      background: #25D366;
      color: #fff;
    }
    .btn-whatsapp svg { width: 20px; height: 20px; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <!-- HERO -->
  <!-- A DOR -->
  <!-- QUEM SOU EU -->
  <!-- COMO TRABALHO -->
  <!-- RESULTADOS -->
  <!-- FERRAMENTAS -->
  <!-- CTA FINAL -->
  <!-- FOOTER -->

  <script>
    // Scroll animations — IntersectionObserver
    const observer = new IntersectionObserver(
      (entries) => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.12 }
    );
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    // Header scroll state
    const header = document.querySelector('.header');
    if (header) {
      window.addEventListener('scroll', () => {
        header.classList.toggle('scrolled', window.scrollY > 20);
      });
    }
  </script>
</body>
</html>
